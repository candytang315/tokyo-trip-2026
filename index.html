<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東京行 2026.08</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<style>
:root{
  --bg:#F7F4EB;
  --card:#FFFFFF;
  --ink:#3A3530;
  --ink-soft:#8A8275;
  --line:#E0E5D5;
  --accent:#C9694F;
  --accent-soft:#F1DCD2;
  --green:#7A8B6F;
  --green-soft:#E6EBDD;
  --blue:#6F89A8;
  --blue-soft:#DEE6ED;
  --gold:#C9A24B;
  --gold-soft:#F0E5C9;
  --shadow: 4px 4px 0px var(--line);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:'Noto Sans TC','Zen Maru Gothic',sans-serif;
  background-color:#FBF6EC;
  background-image:
    radial-gradient(ellipse 480px 420px at 12% 95%, rgba(242,182,198,0.45), transparent 70%),
    radial-gradient(ellipse 420px 360px at 30% 75%, rgba(188,227,176,0.4), transparent 70%),
    radial-gradient(ellipse 400px 360px at 18% 35%, rgba(159,211,232,0.4), transparent 70%),
    radial-gradient(ellipse 460px 400px at 78% 15%, rgba(245,224,140,0.4), transparent 70%),
    radial-gradient(ellipse 420px 400px at 92% 55%, rgba(242,182,198,0.4), transparent 70%),
    radial-gradient(ellipse 380px 320px at 68% 85%, rgba(159,211,232,0.35), transparent 70%),
    radial-gradient(ellipse 320px 280px at 55% 40%, rgba(188,227,176,0.35), transparent 70%);
  background-attachment:fixed;
  color:var(--ink);
  min-height:100vh;
  padding-bottom:84px;
}
.app{max-width:480px; margin:0 auto; min-height:100vh; position:relative;}

/* Header */
.topbar{
  padding:0 0 14px;
  position:relative;
  background:transparent;
}
.sousou-strip{display:none;}
.topbar-row{display:flex; align-items:center; justify-content:space-between; padding:22px 18px 0;}
.brand{display:flex; align-items:center; gap:10px;}
.brand-icon{
  width:38px; height:38px; border-radius:12px;
  background:#3F6B8C; color:#fff; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:var(--shadow);
}
.brand-icon::after{
  content:''; position:absolute; right:-6px; bottom:-6px; width:18px; height:18px;
  background:#D9824B; border-radius:50%; opacity:.9;
}
.brand-text h1{font-size:16px; margin:0; font-weight:900; letter-spacing:.5px;}
.brand-text p{font-size:11px; margin:1px 0 0; color:var(--ink-soft);}
.countdown{
  background:var(--card); border-radius:16px; padding:6px 12px;
  box-shadow:var(--shadow); text-align:center; min-width:62px;
}
.countdown .num{font-size:18px; font-weight:900; color:var(--accent); line-height:1.1;}
.countdown .lbl{font-size:9px; color:var(--ink-soft);}

/* Tabs content area */
.view{padding:6px 18px 18px; display:none;}
.view.active{display:block;}

/* Section title */
.sec-title{
  font-size:13px; font-weight:700; color:var(--ink-soft);
  margin:18px 2px 10px; display:flex; align-items:center; gap:6px;
}
.sec-title i{font-size:12px;}

/* Date scroller */
.date-scroll{
  display:flex; gap:8px; overflow-x:auto; padding:4px 2px 12px;
  scrollbar-width:none;
}
.date-scroll::-webkit-scrollbar{display:none;}
.date-chip{
  flex:0 0 auto; width:64px; height:64px; padding:0; border-radius:16px;
  background:var(--card); text-align:center; cursor:pointer;
  box-shadow:var(--shadow); border:2px solid transparent;
  transition:transform .15s; position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
}
.date-chip.active{border-color:#3F6B8C; background:#FBF3E7;}
.date-chip.active::before{
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:#3F6B8C; opacity:0.5;
}
.date-chip:active{transform:scale(.95);}
.date-chip .daynum{font-size:9px; color:var(--accent); font-weight:900; letter-spacing:.5px;}
.date-chip .day{font-size:17px; font-weight:900; line-height:1.1;}
.date-chip .dow{font-size:10px; color:var(--ink-soft); font-weight:700;}

/* Weather card */
.weather-card{
  background:linear-gradient(135deg,#EDE7D3,#F7F4EB); border-radius:22px; padding:18px 18px 16px;
  box-shadow:var(--shadow); margin-bottom:16px;
}
.weather-top{display:flex; align-items:flex-start; justify-content:space-between;}
.weather-loc-tag{
  display:flex; align-items:center; gap:5px; font-size:10.5px; color:var(--ink-soft);
  font-weight:700; letter-spacing:.5px;
}
.weather-desc-row{display:flex; align-items:center; gap:8px; margin-top:8px;}
.weather-desc-main{font-size:19px; font-weight:900;}
.weather-icon{font-size:24px; color:var(--gold);}
.weather-temp-big{font-size:32px; font-weight:900; color:var(--ink); line-height:1;}
.weather-temp-range{font-size:11px; color:var(--ink-soft); margin-top:3px;}
.weather-stats{display:flex; gap:8px; margin-top:14px;}
.weather-stat{
  flex:1; background:rgba(255,255,255,.65); border-radius:14px; padding:10px 6px;
  text-align:center;
}
.weather-stat i{font-size:14px; color:var(--blue); margin-bottom:4px; display:block;}
.weather-stat .val{font-size:13px; font-weight:900;}
.weather-stat .lbl{font-size:9px; color:var(--ink-soft); margin-top:1px;}
.weather-advice{
  margin-top:12px; background:rgba(255,255,255,.7); border-radius:14px; padding:10px 12px;
  display:flex; gap:8px; align-items:flex-start;
}
.weather-advice i{color:var(--accent); font-size:13px; margin-top:2px;}
.weather-advice-text{font-size:11.5px; line-height:1.6;}
.weather-advice-text b{display:block; font-size:10px; color:var(--accent); margin-bottom:2px; letter-spacing:.5px;}


/* Timeline */
.timeline{position:relative; padding-left:6px;}
.tl-item{
  display:flex; gap:12px; margin-bottom:14px; cursor:pointer;
}
.tl-time{
  flex:0 0 52px; font-size:12px; font-weight:900; color:var(--ink-soft);
  padding-top:14px; text-align:right;
}
.tl-line{flex:0 0 20px; display:flex; flex-direction:column; align-items:center;}
.tl-dot{
  width:14px; height:14px; border-radius:50%; margin-top:14px;
  border:3px solid var(--card); box-shadow:0 0 0 2px var(--cat-color);
  background:var(--cat-color);
}
.tl-bar{flex:1; width:2px; background:var(--line); margin-top:4px; border-radius:2px;}
.tl-card{
  flex:1; background:var(--card); border-radius:18px; padding:13px 15px;
  box-shadow:var(--shadow);
}
.tl-card:active{transform:scale(.98);}
.tl-cat{
  display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700;
  padding:3px 9px; border-radius:20px; margin-bottom:7px;
}
.tl-title{font-size:14px; font-weight:700; margin:0 0 3px;}
.tl-sub{font-size:11.5px; color:var(--ink-soft); margin:0; line-height:1.5;}
.tl-note{
  margin-top:7px; font-size:11px; color:var(--accent); background:var(--accent-soft);
  border-radius:10px; padding:6px 9px; display:flex; gap:6px; align-items:flex-start;
}

/* category colors */
.cat-food{--cat-color:var(--accent); background:var(--accent-soft); color:var(--accent);}
.cat-spot{--cat-color:var(--green); background:var(--green-soft); color:var(--green);}
.cat-transport{--cat-color:var(--blue); background:var(--blue-soft); color:var(--blue);}
.cat-stay{--cat-color:var(--gold); background:var(--gold-soft); color:#9c7a1f;}

/* Booking cards */
.boarding-pass{
  background:linear-gradient(135deg,#2C2A28,#3A3633); color:#F7F4EB;
  border-radius:20px; padding:18px; margin-bottom:14px; position:relative;
  box-shadow:var(--shadow); overflow:hidden;
}
.boarding-pass::after{
  content:''; position:absolute; right:-14px; top:50%; transform:translateY(-50%);
  width:28px; height:28px; background:var(--bg); border-radius:50%;
}
.bp-top{display:flex; justify-content:space-between; align-items:flex-start;}
.bp-airline{font-size:11px; opacity:.7; letter-spacing:1px;}
.bp-flight{font-size:20px; font-weight:900; margin-top:2px;}
.bp-route{display:flex; align-items:center; justify-content:space-between; margin:16px 0 10px;}
.bp-city{font-size:24px; font-weight:900;}
.bp-city-sub{font-size:10px; opacity:.6;}
.bp-plane{font-size:14px; opacity:.5;}
.bp-bottom{display:flex; justify-content:space-between; border-top:1px dashed rgba(247,244,235,.25); padding-top:10px; margin-top:8px;}
.bp-field{font-size:9px; opacity:.6;}
.bp-field b{display:block; font-size:13px; opacity:1; font-weight:700; margin-top:2px;}

.booking-card{
  background:var(--card); border-radius:18px; padding:15px 16px; margin-bottom:14px;
  box-shadow:var(--shadow);
}
.bk-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.bk-icon{
  width:34px; height:34px; border-radius:11px; display:flex; align-items:center;
  justify-content:center; font-size:14px; flex:0 0 34px;
}
.bk-title{font-size:14px; font-weight:700;}
.bk-sub{font-size:10.5px; color:var(--ink-soft);}
.bk-row{
  display:flex; justify-content:space-between; font-size:12px; padding:6px 0;
  border-top:1px solid #F2EFE3;
}
.bk-row .k{color:var(--ink-soft);}
.bk-row .v{font-weight:700; text-align:right;}
.bk-split{
  margin-top:10px; background:var(--green-soft); border-radius:12px; padding:9px 12px;
  display:flex; justify-content:space-between; align-items:center; font-size:12px;
}
.bk-split b{color:var(--green); font-size:14px;}

/* Todo */
.todo-card{
  background:var(--card); border-radius:16px; padding:13px 15px; margin-bottom:10px;
  box-shadow:var(--shadow); display:flex; align-items:center; gap:12px;
}
.todo-check{
  width:24px; height:24px; border-radius:8px; border:2px solid var(--line);
  flex:0 0 24px; display:flex; align-items:center; justify-content:center;
  font-size:12px; color:transparent; cursor:pointer; transition:.15s;
}
.todo-check.done{background:var(--green); border-color:var(--green); color:#fff;}
.todo-text{flex:1; font-size:13.5px; font-weight:500;}
.todo-text.done{text-decoration:line-through; color:var(--ink-soft);}
.todo-due{font-size:10px; color:var(--accent); font-weight:700; background:var(--accent-soft); padding:3px 8px; border-radius:20px;}
.shop-thumb{
  width:42px; height:42px; border-radius:10px; object-fit:contain; flex:0 0 42px; cursor:pointer;
  background:#F2EFE3;
}

/* Bottom nav */
.bottomnav{
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  display:flex; justify-content:center;
}
.bottomnav-inner{
  width:100%; max-width:480px; background:var(--card);
  border-radius:24px 24px 0 0; box-shadow:0 -4px 18px rgba(0,0,0,.06);
  display:flex; padding:10px 6px calc(10px + env(safe-area-inset-bottom));
  position:relative; overflow:hidden;
}
.bottomnav-inner::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:#3F6B8C; opacity:0.5;
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 0; border-radius:14px; cursor:pointer; color:var(--ink-soft);
  transition:.15s; position:relative;
}
.nav-btn:active{transform:scale(.93);}
.nav-btn.active{color:#fff; background:#3F6B8C;}
.nav-btn i{font-size:17px;}
.nav-btn span{font-size:10px; font-weight:700;}

/* Modal */
.modal-bg{
  position:fixed; inset:0; background:rgba(58,53,48,.5); z-index:50;
  display:none; align-items:flex-end; justify-content:center;
}
.modal-bg.open{display:flex;}
.modal-sheet{
  width:100%; max-width:480px; background:var(--bg); border-radius:24px 24px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:80vh; overflow-y:auto;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px; height:4px; background:var(--line); border-radius:4px; margin:0 auto 16px;}
.modal-close{
  position:absolute; right:18px; top:18px; width:30px; height:30px; border-radius:50%;
  background:var(--card); display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow); color:var(--ink-soft); cursor:pointer;
}

.empty-state{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty-state i{font-size:30px; margin-bottom:10px; opacity:.4;}
.empty-state p{font-size:12.5px;}

/* Hotel photo */
.bk-photo{
  width:100%; height:140px; border-radius:14px; object-fit:cover;
  margin-bottom:12px; background:var(--bg);
}

/* Expense dashboard */
.expense-dashboard{
  background:linear-gradient(135deg, var(--accent), #B85A40); color:#fff;
  border-radius:20px; padding:20px 18px; margin-bottom:18px; box-shadow:var(--shadow);
}
.expense-total-lbl{font-size:11px; opacity:.8;}
.expense-total-num{font-size:30px; font-weight:900; margin:4px 0 2px;}
.expense-total-sub{font-size:11px; opacity:.75;}
.expense-cats{display:flex; gap:8px; margin-top:14px; overflow-x:auto;}
.expense-cat-chip{
  background:rgba(255,255,255,.18); border-radius:12px; padding:7px 11px;
  font-size:11px; white-space:nowrap; flex:0 0 auto;
}
.expense-cat-chip b{display:block; font-size:13px; margin-top:1px;}

/* Expense item */
.exp-item{
  background:var(--card); border-radius:16px; padding:12px 14px; margin-bottom:10px;
  box-shadow:var(--shadow); display:flex; align-items:center; gap:12px;
}
.exp-icon{
  width:38px; height:38px; border-radius:12px; flex:0 0 38px;
  display:flex; align-items:center; justify-content:center; font-size:15px;
}
.exp-mid{flex:1; min-width:0;}
.exp-title{font-size:13.5px; font-weight:700;}
.exp-sub{font-size:10.5px; color:var(--ink-soft); margin-top:1px;}
.exp-amt{text-align:right; flex:0 0 auto;}
.exp-amt-jpy{font-size:14px; font-weight:900;}
.exp-amt-twd{font-size:10px; color:var(--ink-soft);}
.exp-del{color:#D9A0A0; font-size:13px; padding:4px;}

.date-divider{font-size:11px; color:var(--ink-soft); font-weight:700; margin:14px 2px 8px; display:flex; align-items:center; gap:8px;}
.date-divider::after{content:''; flex:1; height:1px; background:var(--line);}


.add-fab{
  position:fixed; right:18px; bottom:92px; z-index:35;
  width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:18px;
  box-shadow:0 6px 16px rgba(201,105,79,.4); cursor:pointer; border:none;
}
.add-fab:active{transform:scale(.92);}

input, textarea, select{
  width:100%; border:2px solid var(--line); border-radius:12px; padding:10px 12px;
  font-size:13px; font-family:inherit; background:#fff; color:var(--ink); margin-bottom:10px;
}
input:focus, textarea:focus, select:focus{outline:none; border-color:var(--accent);}
label{font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:4px; display:block;}
.btn-primary{
  width:100%; background:var(--accent); color:#fff; border:none; border-radius:14px;
  padding:13px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:var(--shadow);
}
.btn-primary:active{transform:scale(.98);}
</style>
</head>
<body>

<!-- ===== LOGIN GATE ===== -->
<div id="loginGate" style="position:fixed; inset:0; z-index:200; background:#FBF6EC; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:340px; width:100%; background:#fff; border-radius:24px; padding:32px 26px; box-shadow:4px 4px 0px #E0E5D5; text-align:center;">
    <div style="width:54px; height:54px; border-radius:16px; background:#3F6B8C; color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; margin:0 auto 16px;">
      <i class="fa-solid fa-suitcase-rolling"></i>
    </div>
    <h1 style="font-size:17px; margin:0 0 4px; font-weight:900;">東京家族旅行</h1>
    <p style="font-size:12px; color:#8A8275; margin:0 0 22px;">請輸入密碼進入</p>
    <input type="password" id="loginPwInput" placeholder="密碼" style="text-align:center; font-size:16px; letter-spacing:2px;">
    <button class="btn-primary" id="loginSubmitBtn" style="margin-top:8px;">進入</button>
    <p id="loginError" style="color:#C9694F; font-size:11px; margin-top:10px; display:none;">密碼錯誤，請再試一次</p>
  </div>
</div>

<div class="app" id="app" style="display:none;">

  <!-- ===== TOPBAR ===== -->
  <div class="topbar">
    <div class="sousou-strip"></div>
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-suitcase-rolling"></i></div>
        <div class="brand-text">
          <h1>東京家族旅行</h1>
          <p>2026.08.05 – 08.09</p>
        </div>
      </div>
      <div class="countdown">
        <div class="num" id="countdownNum">--</div>
        <div class="lbl">天後出發</div>
      </div>
    </div>
  </div>

  <!-- ===== VIEW: 行程 ===== -->
  <div class="view active" id="view-schedule">

    <div class="date-scroll" id="dateScroll"></div>

    <div class="weather-card" id="weatherCard"></div>

    <div class="sec-title"><i class="fa-solid fa-route"></i> 今日時間軸</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- ===== VIEW: 預訂 ===== -->
  <div class="view" id="view-bookings">

    <div class="sec-title"><i class="fa-solid fa-plane"></i> 機票</div>
    <div id="flightList"></div>

    <div class="sec-title"><i class="fa-solid fa-bed"></i> 住宿</div>
    <div id="hotelList"></div>

    <div class="sec-title"><i class="fa-solid fa-ticket"></i> 票券 / 憑證</div>
    <div id="ticketList"></div>
  </div>

  <!-- ===== VIEW: 待辦 ===== -->
  <div class="view" id="view-todo">
    <div class="sec-title"><i class="fa-solid fa-list-check"></i> 出發前待辦</div>
    <div id="todoList"></div>
    <div class="sec-title"><i class="fa-solid fa-suitcase"></i> 行李清單</div>
    <div id="packList"></div>
    <div class="sec-title"><i class="fa-solid fa-cart-shopping"></i> 購買清單</div>
    <div id="shopList"></div>
  </div>

  <!-- ===== VIEW: 記帳 ===== -->
  <div class="view" id="view-expense">
    <div class="expense-dashboard" id="expenseDashboard"></div>
    <div class="sec-title"><i class="fa-solid fa-receipt"></i> 支出明細</div>
    <div id="expenseList"></div>
  </div>

</div>

<button class="add-fab" id="addFab"><i class="fa-solid fa-plus"></i></button>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottomnav">
  <div class="bottomnav-inner">
    <div class="nav-btn active" data-view="schedule">
      <i class="fa-solid fa-calendar-days"></i><span>行程</span>
    </div>
    <div class="nav-btn" data-view="bookings">
      <i class="fa-solid fa-book-bookmark"></i><span>預訂</span>
    </div>
    <div class="nav-btn" data-view="todo">
      <i class="fa-solid fa-list-check"></i><span>待辦</span>
    </div>
    <div class="nav-btn" data-view="expense">
      <i class="fa-solid fa-wallet"></i><span>記帳</span>
    </div>
  </div>
</div>

<!-- ===== Detail Modal ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal-sheet" id="modalSheet" style="position:relative;">
    <div class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></div>
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
const WORKER_API = 'https://steep-sound-fe2e.candytang315.workers.dev';

/* ============ LOGIN ============ */
async function checkLogin(){
  const saved = sessionStorage.getItem('tokyo_auth');
  if(saved){
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    return true;
  }
  return false;
}

document.getElementById('loginSubmitBtn').onclick = async ()=>{
  const pw = document.getElementById('loginPwInput').value;
  document.getElementById('loginSubmitBtn').textContent = '驗證中...';
  try{
    const res = await fetch(`${WORKER_API}/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    const data = await res.json();
    if(data.ok){
      sessionStorage.setItem('tokyo_auth', data.token);
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await initApp();
    } else {
      document.getElementById('loginError').style.display = 'block';

async function fetchCloudData(){
  const authToken = sessionStorage.getItem('tokyo_auth');
  const res = await fetch(`${WORKER_API}/data`, {
    headers: {'X-Site-Password': authToken}
  });
  if(!res.ok) throw new Error('讀取失敗');
  return await res.json();
}

async function saveCloudData(data){
  const authToken = sessionStorage.getItem('tokyo_auth');
  const res = await fetch(`${WORKER_API}/data`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-Site-Password': authToken},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error('儲存失敗');
  return await res.json();
}

const CAT_LABEL = {food:'美食', spot:'景點', transport:'交通', stay:'住宿'};
const CAT_ICON = {food:'fa-utensils', spot:'fa-map-pin', transport:'fa-train-subway', stay:'fa-bed'};

function renderTimeline(){
  const items = state.schedule[state.selectedDate] || [];
  const el = document.getElementById('timeline');
  if(items.length===0){
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-mug-hot"></i><p>這天還沒有安排行程</p></div>`;
    return;
  }
  el.innerHTML = items.map((it, idx)=>`
    <div class="tl-item" data-idx="${idx}">
      <div class="tl-time">${it.time}</div>
      <div class="tl-line">
        <div class="tl-dot cat-${it.cat}"></div>
        ${idx<items.length-1?'<div class="tl-bar"></div>':''}
      </div>
      <div class="tl-card">
        <span class="tl-cat cat-${it.cat}"><i class="fa-solid ${CAT_ICON[it.cat]}"></i> ${CAT_LABEL[it.cat]}</span>
        <p class="tl-title">${it.title}</p>
        <p class="tl-sub">${it.sub}</p>
        ${it.note?`<div class="tl-note"><i class="fa-solid fa-pen" style="margin-top:2px;"></i><span>${it.note}</span></div>`:''}
      </div>
    </div>
  `).join('');

  el.querySelectorAll('.tl-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const idx = item.dataset.idx;
      const it = items[idx];
      openModal(`
        <span class="tl-cat cat-${it.cat}" style="margin-bottom:12px;"><i class="fa-solid ${CAT_ICON[it.cat]}"></i> ${CAT_LABEL[it.cat]}</span>
        <h2 style="margin:6px 0 4px; font-size:19px;">${it.title}</h2>
        <p style="color:var(--ink-soft); font-size:13px; margin:0 0 14px;">${it.time} ・ ${state.selectedDate}</p>
        <p style="font-size:13.5px; line-height:1.7;">${it.sub}</p>
        ${it.note?`<div class="tl-note" style="margin-top:14px;"><i class="fa-solid fa-pen" style="margin-top:2px;"></i><span>${it.note}</span></div>`:''}
        <div style="display:flex; gap:8px; margin-top:18px;">
          <button class="btn-primary" style="background:var(--blue);" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(it.title)}','_blank')">
            <i class="fa-solid fa-location-dot"></i> 開啟地圖
          </button>
          <button class="btn-primary" onclick="openEditScheduleModal('${state.selectedDate}', ${idx})">
            <i class="fa-solid fa-pen"></i> 編輯
          </button>
        </div>
      `);
    });
  });
}

function openEditScheduleModal(date, idx){
  const it = state.schedule[date][idx];
  const catOptions = Object.keys(CAT_LABEL).map(k=>`<option value="${k}" ${k===it.cat?'selected':''}>${CAT_LABEL[k]}</option>`).join('');
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">編輯行程</h2>
    <label>時間</label>
    <input type="text" id="editTime" value="${it.time}">
    <label>類別</label>
    <select id="editCat">${catOptions}</select>
    <label>標題</label>
    <input type="text" id="editTitle" value="${it.title}">
    <label>說明</label>
    <textarea id="editSub" rows="2">${it.sub}</textarea>
    <label>備註（選填）</label>
    <textarea id="editNote" rows="2">${it.note||''}</textarea>
    <button class="btn-primary" id="editSubmit">儲存</button>
    <button class="btn-primary" id="editDelete" style="background:#D9A0A0; margin-top:8px;">刪除這個行程</button>
  `);
  document.getElementById('editSubmit').onclick = ()=>{
    state.schedule[date][idx] = {
      time: document.getElementById('editTime').value.trim(),
      cat: document.getElementById('editCat').value,
      title: document.getElementById('editTitle').value.trim(),
      sub: document.getElementById('editSub').value.trim(),
      note: document.getElementById('editNote').value.trim(),
    };
    saveState();
    renderTimeline();
    closeModal();
  };
  document.getElementById('editDelete').onclick = ()=>{
    state.schedule[date].splice(idx,1);
    saveState();
    renderTimeline();
    closeModal();
  };
}

    <textarea id="newSub" rows="2" placeholder="補充說明"></textarea>
    <label>備註（選填）</label>
    <textarea id="newNote" rows="2" placeholder="提醒事項"></textarea>
    <button class="btn-primary" id="newScheduleSubmit">新增</button>
  `);
  document.getElementById('newScheduleSubmit').onclick = ()=>{
    const title = document.getElementById('newTitle').value.trim();
    if(!title) return;
    if(!state.schedule[state.selectedDate]) state.schedule[state.selectedDate] = [];
    state.schedule[state.selectedDate].push({
      time: document.getElementById('newTime').value.trim(),
      cat: document.getElementById('newCat').value,
      title: title,
      sub: document.getElementById('newSub').value.trim(),
      note: document.getElementById('newNote').value.trim(),
    });
    saveState();
    renderTimeline();
    closeModal();
  };
}

/* ============ RENDER: bookings ============ */
function renderFlights(){
  document.getElementById('flightList').innerHTML = FLIGHTS.map(f=>`
    <div class="boarding-pass">
      <div class="bp-top">
        <div>

function renderHotels(){

function renderTickets(){

      <div class="bk-icon" style="background:${COLOR_SOFT_MAP[t.color]}; color:${COLOR_MAP[t.color]};">

      </div>
      <div class="todo-text" style="flex:1;">${t.title}</div>

    </div>

}

/* ============ RENDER: todo & pack ============ */
function renderTodos(){
  const el = document.getElementById('todoList');
  if(state.todos.length===0){
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-circle-check"></i><p>目前沒有待辦事項</p></div>`;
    return;
  }
  el.innerHTML = state.todos.map((t,i)=>`
    <div class="todo-card">
      <div class="todo-check ${t.done?'done':''}" data-idx="${i}" data-group="todos"><i class="fa-solid fa-check"></i></div>
      <div class="todo-text ${t.done?'done':''}" data-idx="${i}" data-group="todos" style="white-space:pre-wrap; cursor:pointer;">${t.text}</div>
      ${t.due?`<div class="todo-due">${t.due}</div>`:''}
    </div>
  `).join('');
  bindCheck();
  bindTodoTextEdit();
}

function bindTodoTextEdit(){
  document.querySelectorAll('.todo-text[data-group="todos"]').forEach(txt=>{
    txt.onclick = ()=>{
      const idx = txt.dataset.idx;
      openEditTodoModal(idx);
    };
  });
}

function openEditTodoModal(idx){
  const t = state.todos[idx];
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">編輯待辦事項</h2>
    <label>內容（可換行）</label>
    <textarea id="editTodoText" rows="4" style="white-space:pre-wrap;">${t.text}</textarea>
    <label>期限備註（選填）</label>
    <input type="text" id="editTodoDue" value="${t.due||''}">
    <button class="btn-primary" id="editTodoSubmit">儲存</button>
    <button class="btn-primary" id="editTodoDelete" style="background:#D9A0A0; margin-top:8px;">刪除這個項目</button>
  `);
  document.getElementById('editTodoSubmit').onclick = ()=>{
    const text = document.getElementById('editTodoText').value.trim();
    if(!text) return;
    state.todos[idx].text = text;
    state.todos[idx].due = document.getElementById('editTodoDue').value.trim();
    saveState();
    renderTodos();
    closeModal();
  };
  document.getElementById('editTodoDelete').onclick = ()=>{
    state.todos.splice(idx,1);
    saveState();
    renderTodos();
    closeModal();
  };
}

function renderPacks(){
  const el = document.getElementById('packList');
  if(state.packs.length===0){
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-suitcase"></i><p>目前沒有行李清單</p></div>`;
    return;
  }
  el.innerHTML = state.packs.map((t,i)=>`
    <div class="todo-card">
      <div class="todo-check ${t.done?'done':''}" data-idx="${i}" data-group="packs"><i class="fa-solid fa-check"></i></div>
      <div class="todo-text ${t.done?'done':''}" data-idx="${i}" data-group="packs" style="white-space:pre-wrap; cursor:pointer;">${t.text}</div>
    </div>
  `).join('');
  bindCheck();
  bindPackTextEdit();
}

function bindPackTextEdit(){
  document.querySelectorAll('.todo-text[data-group="packs"]').forEach(txt=>{
    txt.onclick = ()=>{
      const idx = txt.dataset.idx;
      openEditPackModal(idx);
    };
  });
}

function openEditPackModal(idx){
  const t = state.packs[idx];
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">編輯行李項目</h2>
    <label>內容（可換行）</label>
    <textarea id="editPackText" rows="4" style="white-space:pre-wrap;">${t.text}</textarea>
    <button class="btn-primary" id="editPackSubmit">儲存</button>
    <button class="btn-primary" id="editPackDelete" style="background:#D9A0A0; margin-top:8px;">刪除這個項目</button>

    const text = document.getElementById('editPackText').value.trim();
    if(!text) return;
    state.packs[idx].text = text;
    saveState();
    renderPacks();
    closeModal();
  };
  document.getElementById('editPackDelete').onclick = ()=>{
    state.packs.splice(idx,1);
    saveState();
    renderPacks();
    closeModal();
  };
}

/* ============ RENDER: shopping list ============ */
function renderShops(){
  const el = document.getElementById('shopList');
  if(state.shops.length===0){
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-cart-shopping"></i><p>目前沒有購買清單</p></div>`;
    return;
  }
  el.innerHTML = state.shops.map((t,i)=>`
    <div class="todo-card">
      <div class="todo-check ${t.done?'done':''}" data-idx="${i}" data-group="shops"><i class="fa-solid fa-check"></i></div>
      ${t.photo ? `<img src="${t.photo}" class="shop-thumb" data-idx="${i}" data-group="shops" onerror="this.style.display='none'">` : ''}
      <div class="todo-text ${t.done?'done':''}" data-idx="${i}" data-group="shops" style="white-space:pre-wrap; cursor:pointer;">${t.text}</div>
      ${t.due?`<div class="todo-due">${t.due}</div>`:''}
    </div>
  `).join('');
  bindCheck();
  bindShopTextEdit();
}

function bindShopTextEdit(){
  document.querySelectorAll('.todo-text[data-group="shops"], .shop-thumb[data-group="shops"]').forEach(el=>{
    el.onclick = ()=>{
      const idx = el.dataset.idx;
      openEditShopModal(idx);
    };
  });
}

function openEditShopModal(idx){
  const t = state.shops[idx];
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">編輯購買項目</h2>
    ${t.photo ? `<img src="${t.photo}" id="shopPhotoPreview" style="width:100%; height:280px; object-fit:contain; border-radius:14px; margin-bottom:10px; background:#F2EFE3; cursor:zoom-in;" onerror="this.style.display='none'">` : ''}
    <label>內容（可換行）</label>
    <textarea id="editShopText" rows="4" style="white-space:pre-wrap;">${t.text}</textarea>
    <label>商品照片網址（選填）</label>
    <input type="text" id="editShopPhoto" value="${t.photo||''}" placeholder="貼上圖片網址 https://...">
    <label>備註（選填，例如價格或店家）</label>
    <input type="text" id="editShopDue" value="${t.due||''}">
    <button class="btn-primary" id="editShopSubmit">儲存</button>
    <button class="btn-primary" id="editShopDelete" style="background:#D9A0A0; margin-top:8px;">刪除這個項目</button>
  `);
  document.getElementById('editShopSubmit').onclick = ()=>{
    const text = document.getElementById('editShopText').value.trim();
    if(!text) return;
    state.shops[idx].text = text;
    state.shops[idx].due = document.getElementById('editShopDue').value.trim();
    state.shops[idx].photo = document.getElementById('editShopPhoto').value.trim();
    saveState();
    renderShops();
    closeModal();
  };
  document.getElementById('editShopDelete').onclick = ()=>{
    state.shops.splice(idx,1);
    saveState();
    renderShops();
    closeModal();
  };
  const photoPreview = document.getElementById('shopPhotoPreview');
  if(photoPreview){
    photoPreview.onclick = ()=> showFullscreenPhoto(t.photo);
  }
}

function showFullscreenPhoto(url){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed; inset:0; background:#000; z-index:100; display:flex; align-items:center; justify-content:center;';
  overlay.innerHTML = `<img src="${url}" style="max-width:100%; max-height:100%; object-fit:contain;">
    <div style="position:absolute; top:18px; right:18px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;"><i class="fa-solid fa-xmark"></i></div>`;
  overlay.onclick = ()=> overlay.remove();
  document.body.appendChild(overlay);
}

function bindCheck(){
  document.querySelectorAll('.todo-check').forEach(chk=>{
    chk.onclick = ()=>{
      const group = chk.dataset.group;
      const idx = chk.dataset.idx;
      state[group][idx].done = !state[group][idx].done;
      saveState();
      if(group==='todos') renderTodos(); else renderPacks();
    };
  });
}

/* ============ RENDER: expense ============ */
function renderExpenseDashboard(){
  const totalJpy = state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const totalTwd = Math.round(totalJpy * state.rate);

  const byCat = {};
  state.expenses.forEach(e=>{ byCat[e.cat] = (byCat[e.cat]||0) + Number(e.amount); });
  const catChips = Object.keys(byCat).map(c=>{
    const info = EXP_CATS[c] || EXP_CATS.other;
    return `<div class="expense-cat-chip">${info.label}<b>¥${byCat[c].toLocaleString()}</b></div>`;
  }).join('');

  document.getElementById('expenseDashboard').innerHTML = `
    <div class="expense-total-lbl">總支出（日幣）</div>
    <div class="expense-total-num">¥${totalJpy.toLocaleString()}</div>
    <div class="expense-total-sub">約 NT$${totalTwd.toLocaleString()} ・ 匯率
      <span id="rateDisplay" style="text-decoration:underline; cursor:pointer;">${state.rate}</span>
    </div>
    ${catChips ? `<div class="expense-cats">${catChips}</div>` : ''}
  `;

  document.getElementById('rateDisplay').onclick = ()=>{
    openModal(`
      <h2 style="margin:6px 0 14px; font-size:17px;">調整日幣→台幣匯率</h2>
      <label>1日幣 = ? 台幣</label>
      <input type="number" step="0.001" id="rateInput" value="${state.rate}">
      <button class="btn-primary" id="rateSubmit">儲存</button>
    `);
    document.getElementById('rateSubmit').onclick = ()=>{
      const v = parseFloat(document.getElementById('rateInput').value);
      if(v>0){ state.rate = v; saveState(); renderExpenseDashboard(); closeModal(); }
    };
  };
}

function renderExpenseList(){
  const el = document.getElementById('expenseList');
  if(state.expenses.length===0){
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-receipt"></i><p>還沒有記帳紀錄，點右下角＋新增</p></div>`;
    return;
  }
  // group by date, newest first
  const sorted = [...state.expenses].sort((a,b)=> (b.date+b.id) > (a.date+a.id) ? 1 : -1);
  let lastDate = null;
  let html = '';
  sorted.forEach(e=>{
    const info = EXP_CATS[e.cat] || EXP_CATS.other;
    if(e.date !== lastDate){
      html += `<div class="date-divider">${e.date}</div>`;
      lastDate = e.date;
    }
    html += `
      <div class="exp-item" data-id="${e.id}">
        <div class="exp-icon" style="background:${COLOR_SOFT_MAP[info.color]}; color:${COLOR_MAP[info.color]};">
          <i class="fa-solid ${info.icon}"></i>
        </div>
        <div class="exp-mid">
          <div class="exp-title">${info.label}${e.note?' · '+e.note:''}</div>
          <div class="exp-sub">${e.date}</div>
        </div>
        <div class="exp-amt">
          <div class="exp-amt-jpy">¥${Number(e.amount).toLocaleString()}</div>
          <div class="exp-amt-twd">≈NT$${Math.round(e.amount*state.rate).toLocaleString()}</div>
        </div>
        <div class="exp-del" data-id="${e.id}"><i class="fa-solid fa-trash"></i></div>
      </div>
    `;
  });
  el.innerHTML = html;

  el.querySelectorAll('.exp-del').forEach(btn=>{
    btn.onclick = (ev)=>{
      ev.stopPropagation();
      state.expenses = state.expenses.filter(e=>e.id !== btn.dataset.id);
      saveState();
      renderExpenseDashboard();
      renderExpenseList();
    };
  });
}

function openAddExpenseModal(){
  const catOptions = Object.keys(EXP_CATS).map(k=>`<option value="${k}">${EXP_CATS[k].label}</option>`).join('');
  const dateOptions = TRIP_DATES.map(d=>`<option value="${d.date}">${d.date} (${d.dow})</option>`).join('');
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">新增支出</h2>
    <label>日期</label>
    <select id="expDate">${dateOptions}</select>
    <label>類別</label>
    <select id="expCat">${catOptions}</select>
    <label>金額（日幣）</label>
    <input type="number" inputmode="numeric" id="expAmount" placeholder="例如：3500">
    <label>備註（選填）</label>
    <input type="text" id="expNote" placeholder="例如：鶯谷園燒肉">
    <button class="btn-primary" id="expSubmit">新增記錄</button>
  `);
  document.getElementById('expSubmit').onclick = ()=>{
    const amount = parseFloat(document.getElementById('expAmount').value);
    if(!amount || amount<=0) return;
    state.expenses.push({
      id: Date.now().toString(),
      date: document.getElementById('expDate').value,
      cat: document.getElementById('expCat').value,
      amount: amount,
      note: document.getElementById('expNote').value.trim(),
    });
    saveState();
    renderExpenseDashboard();
    renderExpenseList();
    closeModal();
  };
}

/* ============ Modal ============ */
function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalBg').onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };

/* ============ FAB (add new todo / expense) ============ */
document.getElementById('addFab').onclick = ()=>{
  const currentView = document.querySelector('.view.active').id;

  if(currentView === 'view-schedule'){
    openAddScheduleModal();
    return;
  }

  if(currentView === 'view-expense'){
    openAddExpenseModal();
    return;
  }

  if(currentView !== 'view-todo'){
    openModal(`
      <h2 style="margin:6px 0 14px; font-size:17px;">切換到「行程」「待辦」或「記帳」分頁即可新增項目</h2>
    `);
    return;
  }
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">新增到哪個清單？</h2>
    <button class="btn-primary" id="addToTodo" style="margin-bottom:8px;"><i class="fa-solid fa-list-check"></i> 出發前待辦</button>
    <button class="btn-primary" id="addToPack" style="margin-bottom:8px; background:var(--gold);"><i class="fa-solid fa-suitcase"></i> 行李清單</button>
    <button class="btn-primary" id="addToShop" style="background:var(--green);"><i class="fa-solid fa-cart-shopping"></i> 購買清單</button>
  `);
  document.getElementById('addToTodo').onclick = ()=> openNewItemModal('todos', renderTodos, true);
  document.getElementById('addToPack').onclick = ()=> openNewItemModal('packs', renderPacks, false);
  document.getElementById('addToShop').onclick = ()=> openNewShopModal();
};

function openNewShopModal(){
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">新增購買項目</h2>
    <label>內容（可換行）</label>
    <textarea id="newShopText" rows="3" placeholder="輸入商品名稱"></textarea>
    <label>商品照片網址（選填）</label>
    <input type="text" id="newShopPhoto" placeholder="貼上圖片網址 https://...">
    <label>備註（選填，例如價格或店家）</label>
    <input type="text" id="newShopDue" placeholder="例如：藥妝店/¥1,500">
    <button class="btn-primary" id="newShopSubmit">新增</button>
  `);
  document.getElementById('newShopSubmit').onclick = ()=>{
    const text = document.getElementById('newShopText').value.trim();
    if(!text) return;
    state.shops.unshift({
      text,
      due: document.getElementById('newShopDue').value.trim(),
      photo: document.getElementById('newShopPhoto').value.trim(),
      done:false
    });
    saveState();
    renderShops();
    closeModal();
  };
}

function openNewItemModal(group, renderFn, hasDue){
  openModal(`
    <h2 style="margin:6px 0 14px; font-size:17px;">新增項目</h2>
    <label>內容（可換行）</label>
    <textarea id="newItemText" rows="3" placeholder="輸入內容"></textarea>
    ${hasDue ? `<label>備註（選填）</label><input type="text" id="newItemDue" placeholder="例如：7/20前 或 價格">` : ''}
    <button class="btn-primary" id="newItemSubmit">新增</button>
  `);
  document.getElementById('newItemSubmit').onclick = ()=>{
    const text = document.getElementById('newItemText').value.trim();
    if(!text) return;
    const due = hasDue ? document.getElementById('newItemDue').value.trim() : '';
    state[group].unshift({text, due, done:false});
    saveState();
    renderFn();
    closeModal();
  };
}

/* ============ Bottom nav switching ============ */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  });
});

/* ============ INIT ============ */
/* ============ INIT ============ */
async function initApp(){
  try{
    const cloud = await fetchCloudData();
    state.todos = cloud.todos && cloud.todos.length ? cloud.todos : TODOS_DEFAULT;
    state.packs = cloud.packs && cloud.packs.length ? cloud.packs : PACK_DEFAULT;
    state.shops = cloud.shops && cloud.shops.length ? cloud.shops : SHOP_DEFAULT;
    state.expenses = cloud.expenses || [];
    state.rate = cloud.rate || JPY_TO_TWD;
    const overrides = cloud.scheduleOverrides || {};
    state.schedule = Object.keys(overrides).length ? overrides : JSON.parse(JSON.stringify(SCHEDULE_DEFAULT));
  } catch(e){
    console.error('雲端資料讀取失敗，使用預設值', e);
    state.todos = TODOS_DEFAULT;
    state.packs = PACK_DEFAULT;
    state.shops = SHOP_DEFAULT;
  }

  renderCountdown();
  renderDateScroll();
  renderWeather();
  renderTimeline();
  renderFlights();
  renderHotels();
  renderTickets();
  renderTodos();
  renderPacks();
  renderShops();
  renderExpenseDashboard();
  renderExpenseList();
}

/* 頁面載入時檢查是否已登入過（同一個瀏覽器分頁內） */
(async ()=>{
  const loggedIn = await checkLogin();
  if(loggedIn) await initApp();
})();

</script>
